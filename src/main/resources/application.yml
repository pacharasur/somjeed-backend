spring:
  application:
    name: somjeed-chatbot
  datasource:
    url: jdbc:postgresql://localhost:5432/chatbot
    username: user
    password: password
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
